<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FishGem Calculator - Convert Fish to Gems & World Locks</title>
    <meta
      name="description"
      content="Calculate your total Fish Gems and World Locks easily with the FishGem Calculator. Optimized for Breaworlds players!"
    />
    <meta
      name="keywords"
      content="FishGem, calculator, world locks, gems, Breaworlds, fish price"
    />
    <meta name="author" content="cytric" />

    <meta
      property="og:title"
      content="FishGem Calculator - Convert Fish to Gems & World Locks"
    />
    <meta
      property="og:description"
      content="Easily calculate your total Fish Gems and World Locks. Essential for Breaworlds traders!"
    />
    <meta property="og:image" content="./images/spr_icon_gems_0.png" />
    <meta property="og:url" content="/fishgems" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="FishGem Calculator - Convert Fish to Gems & World Locks"
    />
    <meta
      name="twitter:description"
      content="Use the FishGem Calculator to quickly determine your gems and world locks. A must-have tool for traders!"
    />
    <meta name="twitter:image" content="./images/spr_icon_gems_0.png" />

    <link
      rel="icon"
      href="./images/favicon_io/favicon.ico"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h2>Fishgem Calculator</h2>

      <div class="result" id="result">
        <!-- This will be sticky and shows the total gems/locks -->
      </div>

      <div id="fishGrid" class="fish-grid">
        <!-- Fish Cards will be injected here -->
      </div>

      <div class="rate-container" id="rateSection">
        <div class="rate-title">
          <img
            src="./images/spr_fg_lock_0.png"
            alt="WL"
            style="width: 24px; height: 24px"
          />
          Gem Rate Configuration
        </div>
        <div class="rate-input-wrapper">
          <div class="rate-input-group">
            <span style="font-size: 1.1rem; color: #ccc; font-weight: 600"
              >1 WL =
            </span>
            <input
              type="number"
              id="gemRate"
              placeholder="Rate?"
              oninput="calculate()"
            />
            <span style="font-size: 1.1rem; color: #ccc; font-weight: 600"
              >Gems</span
            >
          </div>
          <div class="quick-rates">
            <button class="rate-btn" onclick="setRate(600)">600</button>
            <button class="rate-btn" onclick="setRate(700)">700</button>
            <button class="rate-btn" onclick="setRate(800)">800</button>
            <button class="rate-btn" onclick="setRate(900)">900</button>
            <button class="rate-btn" onclick="setRate(1000)">1000</button>
          </div>
        </div>
      </div>

      <div class="result" id="totalResult">
        <!-- Content will be injected by JS -->
      </div>

      <p class="credits">
        For the community, by <span class="rainbow-text">Blane</span>
      </p>
    </div>

    <button
      class="scroll-to-bottom"
      onclick="scrollToRate()"
      title="Go to Bottom"
    >
      <svg viewBox="0 0 24 24">
        <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
      </svg>
    </button>

    <div class="footer" style="margin-bottom: 20px">
      Cytric &copy; 2024 - 2025. All rights reserved.
      <br />
      Resources provided by
      <a
        href="https://breaworldsgame.com"
        target="_blank"
        style="color: #00cc66; text-decoration: none"
        >Breaworlds</a
      >
    </div>

    <script src="./script.js"></script>
  </body>
</html>
